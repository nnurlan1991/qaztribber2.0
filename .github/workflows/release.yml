name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: QazTriber-macos-arm64
          - os: windows-latest
            artifact_name: QazTriber-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller
          # PyInstaller runtime hook (pyi_rth_pkgres) обращается к pkg_resources.NullProvider,
          # удалённому в setuptools >= 70. Понижаем после установки всех зависимостей,
          # т.к. torch требует setuptools>=77 — используем --no-deps чтобы обойти конфликт.
          python -m pip install 'setuptools<70' --no-deps

      - name: Build PyInstaller sidecar
        env:
          PYTHONUTF8: "1"
        run: python packaging/build_release.py

      - name: Install root npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      # Ad-hoc signing для macOS: подписывает внутренние библиотеки sidecar
      # (PyInstaller binaries, libtorch .dylib). Без этого macOS показывает
      # "QazTriber is damaged and can't be opened" из-за неподписанных .dylib.
      # Без Apple Developer ID Gatekeeper всё равно покажет диалог, но
      # пользователь сможет обойти: Right-click → Open → "Open anyway".
      - name: Ad-hoc sign macOS app
        if: matrix.os == 'macos-14'
        run: |
          codesign --force --deep --sign - src-tauri/target/release/bundle/macos/*.app

      # macOS: upload .app and .dmg separately (upload-artifact does NOT support bash brace expansion)
      - name: Upload macOS .app
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload macOS .dmg
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # Windows: upload .exe (NSIS installer)
      - name: Upload Windows .exe
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # Rename release assets to versionless names so the landing page
      # can use stable URLs (releases/latest/download/QazTriber_aarch64.dmg).
      # Mirrors the mobile repo convention (QazTriber.apk without version).
      - name: Rename macOS release asset
        if: matrix.os == 'macos-14' && startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/dmg/*.dmg release-assets/QazTriber_aarch64.dmg

      - name: Rename Windows release asset
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/nsis/*.exe release-assets/QazTriber_x64-setup.exe

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
