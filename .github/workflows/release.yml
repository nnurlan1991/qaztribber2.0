name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: QazTriber-macos-arm64
            artifact_glob: "src-tauri/target/release/bundle/{macos/*.app,dmg/*.dmg}"
            release_glob: "src-tauri/target/release/bundle/dmg/*.dmg,src-tauri/target/release/bundle/macos/*.app"
          - os: windows-latest
            artifact_name: QazTriber-windows
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            release_glob: "src-tauri/target/release/bundle/nsis/*.exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Build PyInstaller sidecar
        run: python packaging/build_release.py

      - name: Install root npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_glob }}
