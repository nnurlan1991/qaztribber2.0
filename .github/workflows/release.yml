name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: QazTriber-macos-arm64
          - os: windows-latest
            artifact_name: QazTriber-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Build PyInstaller sidecar
        env:
          PYTHONUTF8: "1"
        run: python packaging/build_release.py

      - name: Install root npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      # macOS: upload .app and .dmg separately (upload-artifact does NOT support bash brace expansion)
      - name: Upload macOS .app
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload macOS .dmg
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # Windows: upload .exe (NSIS installer)
      - name: Upload Windows .exe
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
