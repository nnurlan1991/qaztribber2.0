name: Build desktop launchers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: QazTriber-macOS
          - os: windows-latest
            artifact: QazTriber-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build browser interface
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller
      - name: Build launcher
        run: python packaging/build_release.py
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          hdiutil create -volname QazTriber -srcfolder dist/QazTriber.app -ov -format UDZO release/QazTriber-macOS.dmg
      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\QazTriber.iss
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
